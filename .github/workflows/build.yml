name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "\u4e0b\u8f7d + \u89e3\u538b mimocode"
        run: |
          curl -L -o /tmp/mimocode.tar.gz \
            https://github.com/XiaomiMiMo/MiMo-Code/releases/latest/download/mimocode-linux-arm64.tar.gz
          mkdir -p /tmp/mimo_extract
          tar xzf /tmp/mimocode.tar.gz -C /tmp/mimo_extract --strip-components=1
          cp /tmp/mimo_extract/mimocode app/src/main/assets/mimocode
          ls -lh app/src/main/assets/mimocode

      - name: "Android SDK"
        uses: android-actions/setup-android@v3

      - name: "Build APK"
        run: ./gradlew assembleDebug

      - name: "Upload APK"
        uses: actions/upload-artifact@v4
        with:
          name: MiMoCode-APK
          path: app/build/outputs/apk/debug/*.apk
