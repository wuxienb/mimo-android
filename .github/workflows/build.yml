name: Build APK
on:
  push: { branches: [ main ] }
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get binary
        run: |
          mkdir -p app/src/main/assets
          curl -L -o mimo.tgz https://github.com/XiaomiMiMo/MiMo-Code/releases/latest/download/mimocode-linux-arm64.tar.gz
          tar xzf mimo.tgz
          BIN=$(find . -maxdepth 2 -name "mimo" -o -name "mimocode" -type f | head -1)
          cp "$BIN" app/src/main/assets/mimocode
          ls -lh app/src/main/assets/mimocode
      - name: Build
        run: ./gradlew assembleDebug
      - name: Upload
        uses: actions/upload-artifact@v4
        with: { name: MiMoCode-APK, path: app/build/outputs/apk/debug/*.apk }
