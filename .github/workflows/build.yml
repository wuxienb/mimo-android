name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "\u4e0b\u8f7d MiMoCode \u4e8c\u8fdb\u5236"
        run: |
          curl -L -o mimocode.tar.gz \
            https://github.com/XiaomiMiMo/MiMo-Code/releases/latest/download/mimocode-linux-arm64.tar.gz
          tar xzf mimocode.tar.gz
          ls -la mimocode*

      - name: "\u79fb\u52a8\u4e8c\u8fdb\u5236\u5230 assets"
        run: |
          mkdir -p app/src/main/assets
          # \u6587\u4ef6\u53ef\u80fd\u5728\u89e3\u538b\u540e\u7684\u76ee\u5f55\u4e2d
          if [ -f mimocode ]; then
            cp mimocode app/src/main/assets/mimocode
          else
            find . -name "mimocode" -type f -exec cp {} app/src/main/assets/mimocode \\;
          fi
          ls -lh app/src/main/assets/mimocode

      - name: "\u8bbe\u7f6e JDK 17"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: "\u8bbe\u7f6e Android SDK"
        uses: android-actions/setup-android@v3

      - name: "\u6784\u5efa APK"
        run: ./gradlew assembleDebug

      - name: "\u4e0a\u4f20 APK"
        uses: actions/upload-artifact@v4
        with:
          name: MiMoCode-APK
          path: app/build/outputs/apk/debug/*.apk
